services:
  api:
    build:
      context: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: local
      DEBUG: "false"
      API_V1_PREFIX: /v1
      DATABASE_URL: postgresql+asyncpg://aftertaste:aftertaste@postgres:5432/aftertaste
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: local-dev-secret
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      RATE_LIMIT_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aftertaste
      POSTGRES_USER: aftertaste
      POSTGRES_PASSWORD: aftertaste
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aftertaste -d aftertaste"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
